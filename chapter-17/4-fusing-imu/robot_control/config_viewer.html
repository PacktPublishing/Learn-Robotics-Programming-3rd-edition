{% extends "robot_control/page.html.j2" %}
{% block title %}Config Store Viewer{% endblock %}
{% block content %}
    <h2>Robot Configuration Store</h2>
    <button id="refreshBtn">Refresh Config</button>
    <div id="configDisplay" style="margin-top: 20px;">
        <p>Click "Refresh Config" to load current configuration values...</p>
    </div>

    <script type="module">
        import { connect } from './mqtt_client.js';
        let mqttClient = connect();

        const configDisplay = document.getElementById('configDisplay');
        const refreshBtn = document.getElementById('refreshBtn');

        // Listen for config list responses
        mqttClient.on('message', (topic, message) => {
            if (topic === 'config/list') {
                const config = JSON.parse(message.toString());
                displayConfig(config);
            }
        });

        mqttClient.subscribe('config/list');

        function displayConfig(config) {
            const keys = Object.keys(config);

            if (keys.length === 0) {
                configDisplay.innerHTML = '<p style="color: orange;">No configuration values stored yet.</p>';
                return;
            }

            let html = '<table style="border-collapse: collapse; width: 100%;">';
            html += '<tr style="background-color: #333;"><th style="border: 1px solid #666; padding: 8px; text-align: left;">Key</th><th style="border: 1px solid #666; padding: 8px; text-align: left;">Value</th></tr>';

            keys.sort().forEach(key => {
                const value = config[key];
                const valueStr = typeof value === 'object' ? JSON.stringify(value) : value;
                const bgColor = value === 0 || value === null ? '#660000' : '#1a1a1a';
                html += `<tr style="background-color: ${bgColor};"><td style="border: 1px solid #666; padding: 8px;"><code>${key}</code></td><td style="border: 1px solid #666; padding: 8px;"><code>${valueStr}</code></td></tr>`;
            });

            html += '</table>';
            html += `<p style="margin-top: 10px; color: #888;">Last updated: ${new Date().toLocaleTimeString()}</p>`;
            configDisplay.innerHTML = html;
        }

        refreshBtn.addEventListener('click', () => {
            // Send an empty message to trigger config list
            mqttClient.publish('config/list/get', '');
            configDisplay.innerHTML = '<p>Loading configuration...</p>';
        });

        // Auto-refresh on page load
        setTimeout(() => {
            refreshBtn.click();
        }, 500);
    </script>
{% endblock %}
