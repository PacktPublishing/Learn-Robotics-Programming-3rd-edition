services:
  # MQTT broker (Mosquitto)
  mqtt:
    image: eclipse-mosquitto:2
    container_name: simulation-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-config:/mosquitto/config
    networks:
      - simulation-network
    user: "0"
    command: |
      sh -c "rm -f /mosquitto/config/passwd && \
        mosquitto_passwd -b -c /mosquitto/config/passwd simuser simpassword && \
        chown mosquitto:mosquitto /mosquitto/config/passwd && \
        exec mosquitto -c /mosquitto/config/mosquitto.conf"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  mqtt-monitor:
    image: eclipse-mosquitto:2
    container_name: simulation-mqtt-monitor
    depends_on:
      - mqtt
    volumes:
      - ./.env.json:/app/.env.json:ro
      - ./mqtt-monitor.sh:/mqtt-monitor.sh:ro
    networks:
      - simulation-network
    command: sh /mqtt-monitor.sh
    profiles:
      - mqtt-monitor

  # Robot services container - runs launcher and simulation services via supervisord
  robot-services:
    build:
      context: ..
      dockerfile: simulation/Dockerfile
      target: services
    container_name: simulation-robot-services
    depends_on:
      - mqtt
    volumes:
      - ./.env.json:/app/robot_control/.env.json
      - ../robot:/app/robot  # Mount robot code for live updates
    network_mode: "service:mqtt"
    profiles:
      - robot-services

  # Web control interface (does not start by default)
  web-control:
    build:
      context: ..
      dockerfile: simulation/Dockerfile
      target: web
    container_name: simulation-web-control
    depends_on:
      - mqtt
    volumes:
      - ./.env.json:/app/robot_control/.env.json
    ports:
      - "8080:8080"
    profiles:
      - web-interface

networks:
  simulation-network:
    driver: bridge
volumes:
  mosquitto-config:
