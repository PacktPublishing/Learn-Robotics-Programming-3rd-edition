# Mosquitto configuration for simulation

# Authentication
password_file /etc/mosquitto/passwd
allow_anonymous false

# MQTT listener
listener 1883
protocol mqtt

# Websockets listener
listener 9001
protocol websockets

# Message queue settings
max_queued_messages 1000
max_inflight_messages 20

# Memory limits
max_packet_size 262144

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# Statistics
sys_interval 10
