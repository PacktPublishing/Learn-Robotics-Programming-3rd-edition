{% extends "robot_control/page.html.j2" %}
{% block title %}Drive straight line{% endblock %}
{% block content %}
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <div class="line_chart">
        <canvas id="plot"></canvas>
    </div>

    <script type="module">
        import 'https://cdn.jsdelivr.net/npm/chart.js';
        import { connect, publish_when_clicked } from './mqtt_client.js';
        import { create_timeseries_chart } from './chart_helper.js';
        let mqttClient = connect();

        publish_when_clicked(mqttClient, "start", "launcher/start", "drive_straight_line");
        publish_when_clicked(mqttClient, "stop", "launcher/stop", "drive_straight_line");
        const behavior_chart = create_timeseries_chart('plot', ['error']);

        mqttClient.subscribe('drive_straight_line/plot');
        mqttClient.on('message', (topic, message) => {
            switch (topic) {
                case 'drive_straight_line/plot':
                    behavior_chart.update_data(JSON.parse(message));
                    break;
            }
        });
    </script>
{% endblock %}
