{% extends "robot_control/page.html.j2" %}
{% block title %}Closed loop motor control{% endblock %}
{% block content %}
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <div id="mm_per_second"></div>
    <div id="proportional"></div>
    <div id="integral"></div>
    <div class="line_chart">
        <canvas id="plot"></canvas>
    </div>

    <script type="module">
        import 'https://cdn.jsdelivr.net/npm/chart.js';
        import { connect, publish_when_clicked } from './mqtt_client.js';
        import { create_timeseries_chart } from './chart_helper.js';
        import { config_store_client, create_numeric_input } from './config_store.js';
        let mqttClient = connect();

        publish_when_clicked(mqttClient, "start", "launcher/start", "closed_loop_motor");
        publish_when_clicked(mqttClient, "stop", "launcher/stop", "closed_loop_motor");
        const behavior_chart = create_timeseries_chart('plot', ['left_error', 'right_error']);

        mqttClient.subscribe('closed_loop_motor/plot');
        mqttClient.on('message', (topic, message) => {
            switch (topic) {
                case 'closed_loop_motor/plot':
                    behavior_chart.update_data(JSON.parse(message));
                    break;
            }
        });

        const config_store = config_store_client(mqttClient);
        create_numeric_input(config_store, 'closed_loop_motor/mm_per_second', 'mm per second', 'mm_per_second', 80);
        create_numeric_input(config_store, 'closed_loop_motor/proportional', 'proportional', 'proportional', 0.004);
        create_numeric_input(config_store, 'closed_loop_motor/integral', 'integral', 'integral', 0.008);
    </script>
{% endblock %}
