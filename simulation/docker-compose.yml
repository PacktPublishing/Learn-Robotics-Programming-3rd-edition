services:
  # MQTT broker (Mosquitto)
  mqtt:
    image: eclipse-mosquitto:2
    container_name: simulation-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto.passwd:/etc/mosquitto/passwd
    networks:
      - simulation-network

  # Robot services container - runs launcher and simulation services via supervisord
  robot-services:
    build:
      context: ..
      dockerfile: simulation/Dockerfile
      target: internal
    container_name: simulation-robot-services
    depends_on:
      - mqtt
    volumes:
      - ./.env.json:/app/robot_control/.env.json
    network_mode: "service:mqtt"
    profiles:
      - robot-services

  # Web control interface (does not start by default)
  web-control:
    build:
      context: ..
      dockerfile: simulation/Dockerfile
      target: web
    container_name: simulation-web-control
    depends_on:
      - mqtt
    volumes:
      - ./.env.json:/app/robot_control/.env.json
    ports:
      - "8080:8080"
    profiles:
      - web-interface

networks:
  simulation-network:
    driver: bridge
