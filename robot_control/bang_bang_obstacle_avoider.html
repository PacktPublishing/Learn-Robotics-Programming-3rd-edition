<!DOCTYPE html>
<html>
    <head>
        <title>Robot control - Bang bang avoider</title>
        <link rel="stylesheet" type="text/css" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <h1>Robot control -Bang bang avoider</h1>
        <a href="index.html">Back to menu</a>
        <button id="start_avoider">Start avoider</button>
        <button id="stop_avoider">Stop avoider</button>
        <iframe src="/distance_plotter"></iframe>
        <iframe id="avoider"></iframe>
        <script type="module">
            import { connect, publish_when_clicked } from './mqtt_client.js';
            let mqttClient = connect();
            mqttClient.subscribe("behavior/bang_bang_obstacle_avoider", (topic, message) => {
                document.getElementById("avoider").setAttribute("src", "/bang_bang_obstacle_avoider_plot?random=" + Math.random());
            });

            publish_when_clicked(mqttClient, "start_avoider", "launcher/start", "bang_bang_obstacle_avoider");
            publish_when_clicked(mqttClient, "stop_avoider", "launcher/stop", "bang_bang_obstacle_avoider");
        </script>
    </body>
</html>
