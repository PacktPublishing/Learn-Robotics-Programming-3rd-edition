<!DOCTYPE html>
<html>
    <head>
        <title>Robot control - Manual drive</title>
        <link rel="stylesheet" type="text/css" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="libs/joy.js"></script>
    </head>
    <body>
        <h1>Robot control - Manual drive</h1>
        <a href="index.html">Back to menu</a>
        <button id="start_ranging">Start ranging</button>
        <button id="stop_ranging">Stop ranging</button>
        <iframe src="/distance_plotter"></iframe>
        <div id="joydiv" style="width:35vh;height: 30vh;"></div>
        <script type="module">
            import { connect, publish_when_clicked } from './mqtt_client.js';
            let mqttClient = connect();

            publish_when_clicked(mqttClient, "start_ranging", "sensors/distance/control/start_ranging", " ");
            publish_when_clicked(mqttClient, "stop_ranging", "sensors/distance/control/stop_ranging", " ");

            var joystick = new JoyStick(
              'joydiv', 
              {} , 
              function(stickData) {
                console.log(stickData.x, stickData.y);
                let speed = stickData.y / 100;
                let direction = stickData.x / 100;
                console.log("Speed:", speed, "Direction:", direction);
                mqttClient.publish("motors/wheels", JSON.stringify(
                  [speed + direction, speed - direction]
                ));
              }
          );
        </script>
    </body>
</html>
